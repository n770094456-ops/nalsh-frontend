here# netlify.toml

[build]
  # هذا هو المجلد الذي سيتم نشره. بما أن ملفاتنا جاهزة، نتركه كما هو.
  publish = "/"
  # هذا هو المجلد الذي سنضع فيه وظائف السيرفرلس
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "https://vay.rf.gd/api.php/:splat" # استبدل هذا برابط سيرفرك الخلفي
  status = 200
  force = true

[[redirects]]
  from = "/session_init.php"
  to = "https://vay.rf.gd/session_init.php" # استبدل هذا برابط سيرفرك الخلفي
  status = 200
  force = true
```    *   **مهم جداً:** قم باستبدال `https://vay.rf.gd` في الأعلى بالرابط الفعلي لاستضافتك القديمة. هذه القاعدة ستقوم بتحويل أي طلب يذهب إلى `your-site.netlify.app/api/` إلى `your-old-server.com/api.php` بشكل خفي وآمن، مما يحل مشاكل CORS نهائياً.
*   ارفع هذا الملف إلى GitHub، وسيقوم Netlify بإعادة النشر تلقائياً.
